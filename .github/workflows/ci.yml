name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Necesario para que el paso de commit del badge tenga permisos
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run tests and generate coverage report
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80
        working-directory: backend

      - name: Generate coverage badge
        run: |
          pip install genbadge[coverage] -q
          genbadge coverage \
            --input-file backend/coverage.xml \
            --output-file docs/coverage-badge.svg

      - name: Commit badge if changed
        # Solo en pushes a main (no en PRs)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/coverage-badge.svg
          git diff --staged --quiet || git commit -m "ci: update coverage badge [skip ci]"
          git push
